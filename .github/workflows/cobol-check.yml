name: COBOL Check Automation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  cobol-check:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Install GnuCOBOL
        run: |
          if ! command -v cobc &>/dev/null; then
            brew install gnucobol
          else
            echo "GnuCOBOL already installed: $(cobc --version | head -1)"
          fi

      - name: Install Zowe CLI
        run: |
          if ! command -v zowe &>/dev/null; then
            npm install -g @zowe/cli@latest --ignore-scripts
          else
            echo "Zowe CLI already installed: $(zowe --version)"
          fi

      - name: Cache COBOL Check JAR
        id: cache-cobolcheck
        uses: actions/cache@v4
        with:
          path: |
            CobolCheck.jar
            scripts/
          key: cobolcheck-${{ runner.os }}-v0.2.19

      - name: Build COBOL Check from source
        if: steps.cache-cobolcheck.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 https://github.com/openmainframeproject/cobol-check.git cobol-check-src
          cd cobol-check-src
          ./gradlew jar
          cp build/libs/cobol-check-*.jar ../CobolCheck.jar
          cp -r scripts ../scripts

      - name: Setup mainframe environment
        env:
          ZOWE_HOST: ${{ secrets.ZOWE_HOST }}
          ZOWE_PORT: ${{ secrets.ZOWE_PORT }}
          ZOWE_USERNAME: ${{ secrets.ZOWE_USERNAME }}
          ZOWE_PASSWORD: ${{ secrets.ZOWE_PASSWORD }}
          ZOWE_REJECT_UNAUTHORIZED: ${{ secrets.ZOWE_REJECT_UNAUTHORIZED }}
        run: |
          chmod +x .github/scripts/zowe_operations.sh
          .github/scripts/zowe_operations.sh

      - name: Run COBOL Check tests
        run: |
          chmod +x scripts/linux_gnucobol_run_tests
          java -jar CobolCheck.jar -p NUMBERS && java -jar CobolCheck.jar -p ALPHA

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cobol-check-results
          path: testruns/
