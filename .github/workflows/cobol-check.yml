name: COBOL Check Automation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  cobol-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Java 11
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '11'

      - name: Build COBOL Check from source
        run: |
          git clone --depth 1 https://github.com/openmainframeproject/cobol-check.git cobol-check-src
          cd cobol-check-src
          ./gradlew jar
          cp build/libs/cobol-check-*.jar ../CobolCheck.jar

      - name: Run COBOL Check tests
        run: |
          java -jar CobolCheck.jar \
            --programs HELLO \
            --source-dir src \
            --test-suite-dir tests \
            --config cobolcheck.properties

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cobol-check-results
          path: "*.xml"
